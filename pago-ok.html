<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¡Pago completado! – MAMEMI Madera</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --wood-dark: #8b5e3c; --wood-deep: #5a3a1a; --mint-dark: #6a9e8a; --mint-light: #e0ede8; --cream: #fdf8f0; --text-mid: #6b4c2a; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .box { background: #fff; border-radius: 24px; padding: 3rem 2.5rem; text-align: center; max-width: 480px; box-shadow: 0 8px 40px rgba(90,58,26,0.12); }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--wood-deep); margin-bottom: 0.8rem; }
    p { font-size: 0.92rem; color: var(--text-mid); line-height: 1.8; font-weight: 300; margin-bottom: 1rem; }
    .btn { display: inline-block; background: var(--wood-dark); color: #fff; border-radius: 30px; padding: 0.75rem 2rem; text-decoration: none; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; transition: background 0.25s; margin-top: 0.5rem; }
    .btn:hover { background: var(--mint-dark); }
    .divider { width: 50px; height: 2px; background: var(--mint-dark); margin: 1rem auto; border-radius: 2px; }
  </style>
  <script>
    // Vaciar carrito al confirmar pago
    localStorage.removeItem('mamemi_cart');
  </script>
</head>
<body>
  <div class="box">
    <div class="icon">🎉</div>
    <h1>¡Pago completado!</h1>
    <div class="divider"></div>
    <p>¡Gracias por tu pedido! He recibido tu compra y me pondré en contacto contigo en las próximas 24–72 h para confirmar los detalles y el plazo de entrega.</p>
    <p>Si tienes cualquier duda escríbeme a <strong>hola@mamemimadera.es</strong> o por WhatsApp.</p>
    <a href="index.html" class="btn">Volver al inicio</a>
  </div>

  <script src="cookies-banner.js"></script>
</body>
</html>
